[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/book"
  to = "/.netlify/functions/book-appointment"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
