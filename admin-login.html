<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rider Motorparts — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --yellow: #FFD000; --yellow-bright: #FFE040;
      --yellow-dim: rgba(255,208,0,0.1); --yellow-border: rgba(255,208,0,0.25);
      --black: #0A0A0A; --dark2: #181818; --dark3: #222222;
      --steel: #2A2A2A; --steel2: #333333;
      --text: #F0F0F0; --text-muted: #888; --text-dim: #444;
      --error: #FF4545; --radius: 12px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Barlow', sans-serif;
      --font-cond: 'Barlow Condensed', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body); background: var(--black); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(var(--steel) 1px, transparent 1px), linear-gradient(90deg, var(--steel) 1px, transparent 1px);
      background-size: 50px 50px; opacity: 0.12;
    }
    .bg-glow {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(255,208,0,0.07) 0%, transparent 65%);
      z-index: 0; pointer-events: none;
    }
    .bg-stripe {
      position: fixed; left: 0; top: 0; bottom: 0; width: 5px;
      background: linear-gradient(to bottom, transparent, var(--yellow), var(--yellow-bright), var(--yellow), transparent);
      z-index: 2;
    }
    .login-wrap { position: relative; z-index: 1; width: 100%; max-width: 460px; padding: 1.5rem; }
    .login-top { text-align: center; margin-bottom: 2rem; animation: fadeUp 0.5s ease 0.1s both; }
    .login-logo {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-family: var(--font-cond); font-weight: 800; font-size: 1.3rem;
      letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 1.2rem;
      text-decoration: none; color: var(--text);
    }
    .logo-text em { color: var(--yellow); font-style: normal; }
    .login-title { font-family: var(--font-display); font-size: 3.2rem; line-height: 1; margin-bottom: 0.4rem; }
    .login-title em { color: var(--yellow); font-style: normal; }
    .login-sub { font-size: 0.88rem; color: var(--text-muted); }
    .login-card {
      background: var(--dark2); border: 1px solid var(--steel2);
      border-radius: 20px; padding: 2.5rem;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      animation: fadeUp 0.5s ease 0.2s both;
    }
    @keyframes fadeUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.2rem; }
    .form-group label {
      font-family: var(--font-cond); font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted);
    }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1rem; opacity: 0.5; pointer-events: none; }
    .form-group input {
      width: 100%; background: var(--dark3); border: 1px solid var(--steel2);
      color: var(--text); padding: 0.85rem 1rem 0.85rem 2.8rem;
      border-radius: var(--radius); font-family: var(--font-body); font-size: 0.95rem;
      transition: all 0.25s ease;
    }
    .form-group input::placeholder { color: var(--text-dim); }
    .form-group input:focus { outline: none; border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(255,208,0,0.1); }
    .toggle-pass {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--yellow); }
    .login-err {
      background: rgba(255,69,69,0.1); border: 1px solid rgba(255,69,69,0.3);
      color: var(--error); border-radius: var(--radius); padding: 0.8rem 1rem;
      font-size: 0.88rem; margin-bottom: 1.2rem; display: none;
    }
    .login-err.show { display: block; }
    .btn-login {
      width: 100%; background: var(--yellow); color: var(--black);
      font-family: var(--font-cond); font-weight: 800; font-size: 1.05rem;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0.95rem;
      border-radius: var(--radius); border: none; cursor: pointer;
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .btn-login:hover:not(:disabled) { background: var(--yellow-bright); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,208,0,0.3); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.3); border-top-color: var(--black); border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
    .spinner.show { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .login-footer { text-align: center; margin-top: 2rem; font-size: 0.82rem; color: var(--text-dim); animation: fadeUp 0.5s ease 0.4s both; }
    .login-footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .login-footer a:hover { color: var(--yellow); }
    .security-badge { display: flex; align-items: center; justify-content: center; gap: 0.4rem; margin-top: 1.2rem; font-size: 0.78rem; color: var(--text-dim); font-family: var(--font-cond); letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-stripe"></div>

  <div class="login-wrap">
    <div class="login-top">
      <a href="index.html" class="login-logo"><span>⚡</span><span class="logo-text">RIDER<em>MOTORPARTS</em></span></a>
      <div class="login-title">ADMIN <em>ACCESS</em></div>
      <p class="login-sub">Restricted area — authorized personnel only</p>
    </div>

    <div class="login-card">
      <div class="login-err" id="loginErr"></div>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input type="email" id="adminEmail" placeholder="admin@ridermotorparts.ph" autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="adminPassword" placeholder="Enter your password" autocomplete="current-password" />
          <button class="toggle-pass" type="button" onclick="togglePass()" id="togglePassBtn">👁️</button>
        </div>
      </div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">
        <span id="loginText">Sign In to Dashboard</span>
        <span class="spinner" id="loginSpinner"></span>
      </button>
    </div>

    <div class="login-footer">
      <a href="index.html">← Back to main site</a>
      <div class="security-badge">🔐 Secured by Supabase Auth</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    (async () => {
      const { data: { session } } = await window.db.auth.getSession();
      if (session) window.location.href = 'admin.html';
    })();

    function togglePass() {
      const inp = document.getElementById('adminPassword');
      const btn = document.getElementById('togglePassBtn');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }

    document.getElementById('adminPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('adminEmail').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('adminPassword').focus(); });

    async function doLogin() {
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;
      const errEl = document.getElementById('loginErr');
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const loginText = document.getElementById('loginText');
      errEl.classList.remove('show');
      if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.classList.add('show'); return; }
      btn.disabled = true; spinner.classList.add('show'); loginText.textContent = 'Signing in…';
      try {
        const { error } = await window.db.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'admin.html';
      } catch (err) {
        errEl.textContent = err.message || 'Invalid credentials. Please try again.';
        errEl.classList.add('show');
        btn.disabled = false; spinner.classList.remove('show'); loginText.textContent = 'Sign In to Dashboard';
      }
    }
  </script>
</body>
</html>
